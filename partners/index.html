<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beacon Bot | Partners</title>
  <link rel="stylesheet" href="https://beaconbot.site/assets/css/style.css" />
  <script src="https://kit.fontawesome.com/a2d04e0f1b.js" crossorigin="anonymous"></script>
  <link rel="icon" href="https://beaconbot.site/assets/img/logo.png" type="image/png" />

  <meta property="og:title" content="Beacon Bot Partners">
  <meta property="og:description" content="Discover our trusted partners that help make Beacon Bot even better.">
  <meta property="og:image" content="https://beaconbot.site/assets/img/embed.png">
  <meta property="og:url" content="https://beaconbot.site/partners">
  <meta property="og:type" content="website">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
    body { background:radial-gradient(circle at 20% 20%, #0d1b2a, #000814); color:#fff; overflow-x:hidden; }
    a { text-decoration:none; }
    .navbar { display:flex; justify-content:space-between; align-items:center; background:rgba(10,15,30,0.8); backdrop-filter:blur(12px); padding:1rem 2.5rem; position:fixed; width:100%; top:0; z-index:999; box-shadow:0 0 25px rgba(0,180,216,0.2); }
    .logo { font-size:1.8rem; font-weight:700; background:linear-gradient(90deg,#00b4d8,#90e0ef); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .nav-links { display:flex; list-style:none; }
    .nav-links a { margin:0 1rem; color:#d1d5db; font-weight:500; transition:0.3s; }
    .nav-links a:hover { color:#00b4d8; text-shadow:0 0 10px #00b4d8; }
    .login-btn { background:linear-gradient(90deg,#00b4d8,#0077b6); border:none; color:#fff; padding:0.6rem 1.4rem; border-radius:8px; cursor:pointer; font-size:1rem; font-weight:500; transition:0.3s; }
    .login-btn:hover { transform:scale(1.05); box-shadow:0 0 20px #00b4d8; }

    main { padding-top:8rem; text-align:center; max-width:1200px; margin:0 auto; }
    h1 { font-size:3rem; margin-bottom:1rem; background:linear-gradient(90deg,#00b4d8,#48cae4,#90e0ef); -webkit-background-clip:text; -webkit-text-fill-color:transparent; animation:glow 3s ease-in-out infinite alternate; }
    @keyframes glow { from { text-shadow:0 0 10px #00b4d8; } to { text-shadow:0 0 25px #48cae4; } }
    p.subtitle { color:#adb5bd; font-size:1.1rem; margin-bottom:3rem; }

    .partners-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:2rem; padding:0 2rem; }
    .partner-card { background:rgba(255,255,255,0.05); border:1px solid rgba(0,180,216,0.15); border-radius:16px; padding:2rem 1.5rem; box-shadow:0 0 20px rgba(0,180,216,0.15); backdrop-filter:blur(12px); transition:0.3s; }
    .partner-card:hover { transform:translateY(-8px); box-shadow:0 0 25px rgba(0,180,216,0.4); }
    .partner-card img { width:90px; height:90px; border-radius:50%; border:2px solid #00b4d8; margin-bottom:1rem; }
    .partner-card h3 { color:#00b4d8; margin-bottom:0.4rem; font-size:1.3rem; display:flex; align-items:center; justify-content:center; gap:8px; }
    .partner-card p { color:#e2e8f0; font-size:0.95rem; margin-bottom:1rem; }
    .partner-card a { background:linear-gradient(90deg,#00b4d8,#0077b6); padding:0.5rem 1rem; border-radius:6px; color:#fff; font-weight:500; transition:0.3s; display:inline-block; margin:0.2rem; }
    .partner-card a:hover { transform:scale(1.05); box-shadow:0 0 20px #00b4d8; }

    .verified i { color:#00b4d8; filter:drop-shadow(0 0 6px #00b4d8); animation:verifyGlow 2s ease-in-out infinite alternate; }
    @keyframes verifyGlow { from { filter:drop-shadow(0 0 6px #00b4d8); } to { filter:drop-shadow(0 0 14px #48cae4); } }

    footer { margin-top:4rem; padding:2rem; text-align:center; color:#64748b; font-size:0.9rem; border-top:1px solid rgba(255,255,255,0.05); }
  </style>
</head>

<body>
  <nav class="navbar" id="navbar">
    <a href="https://beaconbot.site" class="logo">Beacon</a>
    <ul class="nav-links">
      <li><a href="https://beaconbot.site">Home</a></li>
      <li><a href="https://beaconbot.site/commands">Commands</a></li>
      <li><a href="https://discord.gg/7edn5DAA2a" target="_blank">Support</a></li>
      <li><a href="https://beaconbot.site/partners">Partners</a></li>
      <li><a href="https://beaconbot.site/team">Team</a></li>
    </ul>
    <button class="login-btn" id="loginBtn"><i class="fa-brands fa-discord"></i> Add to Server</button>
  </nav>

  <main>
    <h1>Our Trusted Partners</h1>
    <p class="subtitle">Meet the amazing communities and projects working with Beacon Bot.</p>

    <section class="partners-grid">
      <!-- Verified Partner -->
      <div class="partner-card">
        <img src="https://media.discordapp.net/attachments/1411544015060336717/1430200556994953357/75720a3c78e759938c73566c2f577a49.png?ex=69056fd0&is=69041e50&hm=8fccaf5448f4b673f9aca90d792a45793f0d75bd1148588aae37589fe5ab0f7f&=&format=webp&quality=lossless" alt="LunaBot">
        <h3 class="verified"><i class="fa-solid fa-circle-check"></i>N/A</h3>
        <p>N/A</p>
        <a href="N/A" target="_blank">Join Server</a>
        <a href="N/A" target="_blank">Website</a>
      </div>
    </section>

    <footer>
      <p>© 2025 Beacon Bot — Partnering for the future of Discord communities.</p>
    </footer>
  </main>

  <script>
    const CLIENT_ID = "1426142433111965776";
    const OAUTH_URL = `https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&permissions=8&integration_type=0&scope=bot`;
    document.getElementById("loginBtn").addEventListener("click", () => window.location.href = OAUTH_URL);
  </script>
</body>
</html>
